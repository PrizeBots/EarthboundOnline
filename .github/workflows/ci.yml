name: CI

# Fast, asset-light gates (all via `npm run verify`): TypeScript typecheck,
# ESLint, server syntax, Vitest unit tests (Zod override-file validation), and
# the GameHost/combat smoke tests. These need only code + the committed
# pure-index JSON under public/assets/, never the ROM. (A production `vite build`
# is intentionally left out — it's heavier and the dev server already exercises
# the bundle path.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + server syntax + tests)
        run: npm run verify

      # The ROM-parity extraction suite (test/extract/*) is skipIf-guarded on
      # EarthBound.sfc + dumped fixtures, both gitignored — so in CI it ALWAYS
      # skips. Surface that loudly instead of letting a green check imply the
      # extraction pipeline was validated: run `npm test` locally (with the ROM)
      # before shipping extraction-touching changes.
      - name: Warn that the ROM-parity suite did not run
        run: echo "::warning title=Extraction parity suite SKIPPED::test/extract/* needs EarthBound.sfc + local fixtures (gitignored), so CI cannot validate the extraction pipeline. Run 'npm test' locally with the ROM before shipping extraction changes."
