services:
  - type: web
    name: earthbound-online
    runtime: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase/Postgres connection string for accounts/sessions/saves. Set in
      # the Render dashboard (sync:false = not committed). When present the server
      # uses Supabase; when absent it falls back to local SQLite. See
      # SUPABASE_SETUP.md. Without a persistent disk, SQLite saves are lost on
      # redeploy — Supabase is what makes prod logins durable.
      - key: DATABASE_URL
        sync: false
    # TESTING PHASE: ROM-derived game data is force-committed to git (public/
    # assets) so the deploy is self-contained — the vite build copies it into
    # dist/ and the server reads it directly. This intentionally relaxes the
    # ROM-no-commit policy while we're private-testing (no public users yet).
    # AT LAUNCH: stop committing assets, scrub them from git history, and serve
    # them from a persistent disk instead (a `disk:` block here mounted at
    # /opt/render/project/src/public/assets) — see ARCHITECTURE.md "Production
    # data". The server already degrades to relay-only if the data is absent.
